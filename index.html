<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>BolKhata</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #0f172a;
        --bg-end: #1e293b;
        --primary: #3b82f6;
        --success: #10b981;
        --danger: #ef4444;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      h1 {
        font-weight: 800;
        margin-bottom: 2rem;
        text-align: center;
        background: linear-gradient(to right, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .container {
        width: 100%;
        max-width: 400px;
        padding: 2rem;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
        max-height: 90vh;
        overflow-y: auto;
      }

      .hidden {
        display: none !important;
      }

      /* Form Elements */
      input {
        width: 100%;
        padding: 1rem;
        margin-bottom: 1rem;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s ease;
      }

      input:focus {
        border-color: var(--primary);
      }

      button.btn-primary {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.3s ease,
          transform 0.1s ease;
      }

      button.btn-primary:active {
        transform: scale(0.98);
      }

      button.btn-secondary {
        width: 100%;
        padding: 0.9rem;
        background: white;
        color: #333;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      button.btn-secondary:active {
        transform: scale(0.98);
      }

      button.btn-text {
        width: 100%;
        padding: 0.75rem;
        background: transparent;
        color: var(--text-muted);
        border: none;
        font-size: 0.9rem;
        cursor: pointer;
        transition: color 0.2s ease;
      }

      button.btn-text:hover {
        color: white;
      }

      .error-msg {
        color: var(--danger);
        font-size: 0.875rem;
        margin-bottom: 1rem;
        min-height: 20px;
      }

      /* App View Specifics */
      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: 2rem;
      }

      .app-header h2 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .logout-btn {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.875rem;
        transition: all 0.2s ease;
      }

      .logout-btn:active {
        background: rgba(255, 255, 255, 0.1);
      }

      /* Microphone Button */
      .mic-container {
        position: relative;
        width: 160px;
        height: 160px;
        margin: 2rem auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .mic-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, #10b981, #059669);
        border: none;
        color: white;
        font-size: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        z-index: 10;
        transition:
          transform 0.2s ease,
          background 0.3s ease,
          box-shadow 0.3s ease;

        /* Mobile fixes */
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }

      .mic-btn.recording {
        background: linear-gradient(135deg, var(--danger), #b91c1c);
        box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
        transform: scale(0.95);
      }

      /* Pulse Animation */
      .pulse-ring {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.5);
        z-index: 1;
        opacity: 0;
        pointer-events: none;
      }

      .recording ~ .pulse-ring {
        animation: pulse 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }

      .status-text {
        color: var(--text-muted);
        font-size: 1rem;
        margin-top: 1rem;
        min-height: 24px;
      }

      .result-box {
        margin-top: 1.5rem;
        padding: 1.5rem;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        line-height: 1.6;
        min-height: 80px;
        white-space: pre-wrap;
      }

      .text-success {
        color: var(--success);
      }
      .text-danger {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN VIEW -->
    <div id="login-view" class="container">
      <h1>BolKhata</h1>
      <div id="login-error" class="error-msg"></div>

      <!-- MAIN OPTIONS (Phone & Google) -->
      <div id="auth-main-options">
        <label style="display:block; text-align:left; margin-bottom:8px; color:var(--text-muted); font-size:0.9rem;">Sign in with Phone</label>
        <div style="display: flex; gap: 8px; margin-bottom: 1rem;">
          <input type="text" id="phone-country" value="+91" style="flex: 0 0 60px; text-align: center; margin-bottom: 0;" />
          <input type="tel" id="phone-number" placeholder="9876543210" style="margin-bottom: 0;" />
        </div>
        <button id="send-sms-btn" class="btn-primary">Send OTP</button>
        <div id="recaptcha-container" style="margin-top: 10px;"></div>

        <div style="margin: 1.5rem 0; color: var(--text-muted); font-size: 0.9rem; display:flex; align-items:center;">
            <div style="flex:1; height:1px; background:var(--glass-border);"></div>
            <div style="margin:0 10px;">OR</div>
            <div style="flex:1; height:1px; background:var(--glass-border);"></div>
        </div>

        <button id="google-login-btn" class="btn-secondary" style="margin-bottom: 1rem;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width:20px; margin-right:8px;">
          Continue with Google
        </button>

        <button id="show-email-btn" class="btn-text">Use Email & Password Instead</button>
      </div>

      <!-- OTP VERIFICATION VIEW -->
      <div id="auth-otp-view" class="hidden">
        <label style="display:block; text-align:left; margin-bottom:8px; color:var(--text-muted); font-size:0.9rem;">Enter 6-digit OTP</label>
        <input type="number" id="otp-code" placeholder="123456" />
        <button id="verify-otp-btn" class="btn-primary" style="margin-bottom: 1rem;">Verify</button>
        <button id="cancel-otp-btn" class="btn-text">Cancel / Back</button>
      </div>

      <!-- EMAIL LOGIC VIEW -->
      <div id="auth-email-view" class="hidden">
        <h3 id="email-form-title" style="margin-top:0; font-weight:600;">Sign In</h3>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email address" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit" id="login-btn" class="btn-primary" style="margin-bottom:1rem;">Sign In</button>
        </form>
        <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
          <button id="toggle-email-mode-btn" class="btn-text" style="padding:0; width:auto;">Create an account</button>
          <button id="back-to-main-btn" class="btn-text" style="padding:0; width:auto;">Back</button>
        </div>
      </div>
    </div>

    <!-- APP VIEW -->
    <div id="app-view" class="container hidden">
      <div class="app-header">
        <h2>BolKhata</h2>
        <button id="logout-btn" class="logout-btn">Log out</button>
      </div>

      <div class="mic-container">
        <button id="recordBtn" class="mic-btn">🎙️</button>
        <div class="pulse-ring"></div>
      </div>

      <div id="status" class="status-text">Hold to Speak</div>
      <div id="result" class="result-box">
        Your transactions will appear here...
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        onAuthStateChanged,
        signOut,
        RecaptchaVerifier,
        signInWithPhoneNumber,
        GoogleAuthProvider,
        signInWithPopup
      } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

      const isLocalEnv = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
      const configUrl = isLocalEnv ? "http://localhost:8000/config" : "/config";
      
      const configRes = await fetch(configUrl);
      const firebaseConfig = await configRes.json();

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // DOM Elements
      const loginView = document.getElementById("login-view");
      const appView = document.getElementById("app-view");
      const loginError = document.getElementById("login-error");
      
      const authMainOptions = document.getElementById("auth-main-options");
      const authOtpView = document.getElementById("auth-otp-view");
      const authEmailView = document.getElementById("auth-email-view");

      let currentToken = null;

      // --- 1. GLOBAL AUTH OBSERVER ---
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentToken = await user.getIdToken();
          // Reset UI
          authMainOptions.classList.remove("hidden");
          authOtpView.classList.add("hidden");
          authEmailView.classList.add("hidden");
          loginError.innerText = "";

          loginView.classList.add("hidden");
          appView.classList.remove("hidden");
        } else {
          currentToken = null;
          appView.classList.add("hidden");
          loginView.classList.remove("hidden");
        }
      });

      document.getElementById("logout-btn").addEventListener("click", () => {
        signOut(auth);
      });

      // --- 2. PHONE AUTHENTICATION ---
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        'size': 'invisible',
        'callback': (response) => {
          // reCAPTCHA solved
        }
      });

      let confirmationResult = null;

      document.getElementById('send-sms-btn').addEventListener('click', async () => {
          loginError.innerText = "";
          const country = document.getElementById('phone-country').value;
          const phone = document.getElementById('phone-number').value.trim();
          
          if (phone.length < 10) {
              loginError.innerText = "Please enter a valid phone number.";
              return;
          }
          
          const fullPhone = country + phone;

          try {
              const btn = document.getElementById('send-sms-btn');
              btn.innerText = "Sending...";
              
              const appVerifier = window.recaptchaVerifier;
              confirmationResult = await signInWithPhoneNumber(auth, fullPhone, appVerifier);
              
              // Transition to OTP view
              authMainOptions.classList.add('hidden');
              authOtpView.classList.remove('hidden');
              btn.innerText = "Send OTP";
          } catch (err) {
              loginError.innerText = err.message || "Failed to send SMS. Ensure number is valid.";
              console.error(err);
              document.getElementById('send-sms-btn').innerText = "Send OTP";
              if(window.recaptchaVerifier) window.recaptchaVerifier.render().then(widgetId => grecaptcha.reset(widgetId));
          }
      });

      document.getElementById('verify-otp-btn').addEventListener('click', async () => {
          const code = document.getElementById('otp-code').value.trim();
          loginError.innerText = "";
          const btn = document.getElementById('verify-otp-btn');
          btn.innerText = "Verifying...";
          try {
              await confirmationResult.confirm(code);
              // Will trigger onAuthStateChanged globally
          } catch (err) {
              loginError.innerText = "Invalid OTP code.";
          } finally {
              btn.innerText = "Verify";
          }
      });

      document.getElementById('cancel-otp-btn').addEventListener('click', () => {
          authOtpView.classList.add('hidden');
          authMainOptions.classList.remove('hidden');
          loginError.innerText = "";
          document.getElementById('otp-code').value = "";
      });

      // --- 3. GOOGLE AUTHENTICATION ---
      document.getElementById('google-login-btn').addEventListener('click', async () => {
          const provider = new GoogleAuthProvider();
          loginError.innerText = "";
          try {
              await signInWithPopup(auth, provider);
          } catch (err) {
              loginError.innerText = err.message || "Google sign-in failed.";
          }
      });

      // --- 4. EMAIL AUTHENTICATION ---
      let isEmailSignup = false;
      document.getElementById('show-email-btn').addEventListener('click', () => {
          authMainOptions.classList.add('hidden');
          authEmailView.classList.remove('hidden');
          loginError.innerText = "";
      });

      document.getElementById('back-to-main-btn').addEventListener('click', () => {
          authEmailView.classList.add('hidden');
          authMainOptions.classList.remove('hidden');
          loginError.innerText = "";
          document.getElementById('email').value = "";
          document.getElementById('password').value = "";
      });

      document.getElementById('toggle-email-mode-btn').addEventListener('click', (e) => {
          e.preventDefault();
          isEmailSignup = !isEmailSignup;
          document.getElementById('email-form-title').innerText = isEmailSignup ? "Create Account" : "Sign In";
          document.getElementById('login-btn').innerText = isEmailSignup ? "Create automatically & Sign In" : "Sign In";
          document.getElementById('toggle-email-mode-btn').innerText = isEmailSignup ? "Already have an account?" : "Create an account";
      });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          loginError.innerText = "";
          
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const btn = document.getElementById("login-btn");
          btn.innerText = "Processing...";
          
          try {
              if (isEmailSignup) {
                  await createUserWithEmailAndPassword(auth, email, password);
              } else {
                  await signInWithEmailAndPassword(auth, email, password);
              }
          } catch(err) {
              // Format standard firebase errors beautifully
              if (err.code === "auth/email-already-in-use") {
                  loginError.innerText = "Account already exists! Please click 'Already have an account' to sign in.";
              } else if (err.code === "auth/weak-password") {
                  loginError.innerText = "Password is too weak. (Min 6 characters)";
              } else {
                  loginError.innerText = err.message;
              }
          } finally {
              btn.innerText = isEmailSignup ? "Create automatically & Sign In" : "Sign In";
          }
      });


      // --- RECORDING LOGIC ---
      let mediaRecorder;
      let audioChunks = [];
      let activeStream;
      const recordBtn = document.getElementById("recordBtn");
      const status = document.getElementById("status");
      const resultDiv = document.getElementById("result");

      const startRecording = async (e) => {
        if (e.cancelable) e.preventDefault();
        if (!currentToken) return;

        try {
          activeStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(activeStream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) =>
            audioChunks.push(event.data);

          mediaRecorder.onstop = async () => {
            activeStream.getTracks().forEach((track) => track.stop());

            // Re-fetch token just in case it expired during long session
            currentToken = await auth.currentUser.getIdToken();

            status.innerText = "⏳ Processing...";
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            const formData = new FormData();
            formData.append("audio", audioBlob, "recording.webm");

            const isLocal =
              window.location.hostname === "localhost" ||
              window.location.hostname === "127.0.0.1";
            const backendUrl = isLocal
              ? "http://localhost:8000/process_voice"
              : "/process_voice";

            try {
              const response = await fetch(backendUrl, {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${currentToken}`,
                },
                body: formData,
              });

              if (response.status === 401) {
                signOut(auth);
                return;
              }

              const data = await response.json();

              if (data.status === "success") {
                status.innerText = `Heard: "${data.raw_text}"`;
                resultDiv.innerText = data.message;
                resultDiv.className = "result-box text-success";
              } else {
                status.innerText = "❌ Error";
                resultDiv.innerText = data.message || "Unknown error occurred.";
                resultDiv.className = "result-box text-danger";
              }
            } catch (error) {
              status.innerText = "❌ Connection Failed";
              resultDiv.innerText = "Could not connect to the server.";
              resultDiv.className = "result-box text-danger";
            }
          };

          mediaRecorder.start();
          status.innerText = "🔴 Listening... (Sun raha hoon)";
          resultDiv.innerText = "";
          recordBtn.classList.add("recording");
        } catch (err) {
          status.innerText = "❌ Microphone access denied.";
        }
      };

      const stopRecording = (e) => {
        if (e.cancelable) e.preventDefault();
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          recordBtn.classList.remove("recording");
        }
      };

      // Event Listeners for Recording Button
      recordBtn.addEventListener("mousedown", startRecording);
      recordBtn.addEventListener("mouseup", stopRecording);
      recordBtn.addEventListener("mouseleave", stopRecording);

      recordBtn.addEventListener("touchstart", startRecording, {
        passive: false,
      });
      recordBtn.addEventListener("touchend", stopRecording);
      recordBtn.addEventListener("touchcancel", stopRecording);
    </script>
  </body>
</html>
