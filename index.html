<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="BolKhata — Voice-powered inventory and ledger management for shopkeepers." />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BolKhata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ══════════════════════════════════════
         DESIGN SYSTEM
         ══════════════════════════════════════ */
      :root {
        --surface-0: #0a0a0f;
        --surface-1: #12121a;
        --surface-2: #1a1a26;
        --surface-3: #242434;
        --border: rgba(255,255,255,0.06);
        --border-focus: rgba(99,102,241,0.5);
        --text-primary: #eeeef0;
        --text-secondary: #8b8b9e;
        --text-tertiary: #5a5a6e;
        --accent: #6366f1;
        --accent-glow: rgba(99,102,241,0.15);
        --accent-soft: rgba(99,102,241,0.08);
        --green: #22c55e;
        --green-glow: rgba(34,197,94,0.12);
        --red: #ef4444;
        --red-glow: rgba(239,68,68,0.12);
        --amber: #f59e0b;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.25);
        --shadow-btn: 0 1px 3px rgba(0,0,0,0.4);
        --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--surface-0);
        color: var(--text-primary);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Ambient glow behind main card */
      body::before {
        content: '';
        position: fixed;
        top: -40%;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .hidden { display: none !important; }

      /* ══════════════════════════════════════
         CARDS / CONTAINERS
         ══════════════════════════════════════ */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        margin: 16px;
        padding: 32px 24px;
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
      }

      @media (max-width: 480px) {
        .card {
          margin: 8px;
          padding: 28px 20px;
          border-radius: var(--radius-lg);
          max-height: 95dvh;
          overflow-y: auto;
        }
      }

      /* ══════════════════════════════════════
         BRANDING
         ══════════════════════════════════════ */
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .brand-icon {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        flex-shrink: 0;
      }

      .brand-name {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--text-primary);
      }

      .brand-sub {
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      /* ══════════════════════════════════════
         FORM ELEMENTS
         ══════════════════════════════════════ */
      .field-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .field-group {
        margin-bottom: 14px;
      }

      input[type="email"],
      input[type="password"],
      input[type="tel"],
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 14px 16px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition);
        -webkit-appearance: none;
        appearance: none;
      }

      input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      input::placeholder {
        color: var(--text-tertiary);
      }

      /* ══════════════════════════════════════
         BUTTONS
         ══════════════════════════════════════ */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px 20px;
        border: none;
        border-radius: var(--radius-md);
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        position: relative;
        overflow: hidden;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-accent {
        background: var(--accent);
        color: #fff;
        box-shadow: var(--shadow-btn), 0 4px 12px rgba(99,102,241,0.25);
      }

      .btn-accent:hover {
        box-shadow: var(--shadow-btn), 0 6px 20px rgba(99,102,241,0.35);
      }

      .btn-outline {
        background: var(--surface-2);
        color: var(--text-primary);
        border: 1px solid var(--border);
      }

      .btn-outline:hover {
        background: var(--surface-3);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        padding: 10px 12px;
        font-size: 0.85rem;
        font-weight: 500;
      }

      .btn-ghost:hover {
        color: var(--text-primary);
      }

      .btn-icon-google {
        width: 18px;
        height: 18px;
      }

      /* ══════════════════════════════════════
         DIVIDER
         ══════════════════════════════════════ */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .divider span {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ══════════════════════════════════════
         ERROR MESSAGE
         ══════════════════════════════════════ */
      .error-msg {
        font-size: 0.85rem;
        color: var(--red);
        background: var(--red-glow);
        border: 1px solid rgba(239,68,68,0.15);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        margin-bottom: 16px;
        line-height: 1.4;
      }

      .error-msg:empty {
        display: none;
      }

      /* ══════════════════════════════════════
         PHONE INPUT ROW
         ══════════════════════════════════════ */
      .phone-row {
        display: flex;
        gap: 8px;
      }

      .phone-row .country-code {
        flex: 0 0 64px;
        text-align: center;
      }

      .phone-row .phone-input {
        flex: 1;
      }

      /* ══════════════════════════════════════
         APP VIEW — HEADER
         ══════════════════════════════════════ */
      .app-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }

      .app-topbar .brand {
        margin-bottom: 0;
        gap: 8px;
      }

      .app-topbar .brand-icon {
        width: 30px;
        height: 30px;
        font-size: 0.9rem;
      }

      .app-topbar .brand-name {
        font-size: 1.15rem;
      }

      .btn-logout {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
      }

      .btn-logout:active {
        background: var(--surface-3);
      }

      /* ══════════════════════════════════════
         MICROPHONE BUTTON
         ══════════════════════════════════════ */
      .mic-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 0;
      }

      .mic-wrapper {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .mic-btn {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(145deg, var(--accent), #4f46e5);
        color: white;
        font-size: 2.4rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        position: relative;
        box-shadow:
          0 4px 15px rgba(99,102,241,0.35),
          inset 0 1px 0 rgba(255,255,255,0.1);
        transition: all var(--transition);
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      .mic-btn:active {
        transform: scale(0.95);
      }

      .mic-btn.recording {
        background: linear-gradient(145deg, var(--red), #dc2626);
        box-shadow:
          0 4px 20px rgba(239,68,68,0.45),
          inset 0 1px 0 rgba(255,255,255,0.1);
      }

      /* Outer ring */
      .mic-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(99,102,241,0.15);
        pointer-events: none;
        transition: border-color 0.3s ease;
      }

      .mic-btn.recording ~ .mic-ring {
        border-color: rgba(239,68,68,0.2);
        animation: ring-pulse 1.8s ease-out infinite;
      }

      @keyframes ring-pulse {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
      }

      /* Second subtle ring */
      .mic-ring-2 {
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px solid rgba(99,102,241,0.08);
        pointer-events: none;
      }

      .mic-btn.recording ~ .mic-ring-2 {
        border-color: rgba(239,68,68,0.1);
        animation: ring-pulse 1.8s ease-out 0.4s infinite;
      }

      .mic-hint {
        margin-top: 16px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        font-weight: 500;
      }

      /* ══════════════════════════════════════
         RESULT AREA
         ══════════════════════════════════════ */
      .result-area {
        margin-top: 20px;
      }

      .result-label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-tertiary);
        margin-bottom: 8px;
      }

      .result-container {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Result card per action group */
      .result-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .result-card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
      }

      .result-card-icon {
        font-size: 1.1rem;
        line-height: 1;
      }

      .result-card-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.01em;
      }

      .result-card-empty {
        padding: 16px;
        color: var(--text-tertiary);
        font-size: 0.9rem;
        text-align: center;
      }

      /* Table inside result card */
      .result-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .result-table thead th {
        text-align: left;
        padding: 8px 14px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-tertiary);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }

      .result-table tbody td {
        padding: 10px 14px;
        color: var(--text-primary);
        font-weight: 500;
        border-bottom: 1px solid rgba(255,255,255,0.03);
      }

      .result-table tbody tr:last-child td {
        border-bottom: none;
      }

      .result-table tbody tr:hover {
        background: rgba(255,255,255,0.02);
      }

      /* Numeric cells right-aligned */
      .result-table .cell-num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* Error list */
      .error-list {
        list-style: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .error-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--red-glow);
        border: 1px solid rgba(239,68,68,0.12);
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        color: var(--red);
        font-weight: 500;
      }

      /* Placeholder / idle state */
      .result-placeholder {
        padding: 20px 16px;
        text-align: center;
        color: var(--text-tertiary);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .heard-text {
        font-size: 0.8rem;
        color: var(--text-tertiary);
        margin-bottom: 10px;
        font-style: italic;
      }

      .heard-text:empty { display: none; }

      /* Horizontal scroll for tables on tiny screens */
      .table-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* ══════════════════════════════════════
         ANIMATIONS
         ══════════════════════════════════════ */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card {
        animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Spinner for loading states */
      .btn .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Processing animation for mic-hint */
      .processing-dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }

      /* ══════════════════════════════════════
         BOTTOM LINK ROW
         ══════════════════════════════════════ */
      .link-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        margin-top: 4px;
      }

      .link-row .btn-ghost {
        padding: 8px 6px;
      }

      /* ══════════════════════════════════════
         HAMBURGER MENU
         ══════════════════════════════════════ */
      .hamburger-btn {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        width: 36px;
        height: 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
        transition: background var(--transition);
        -webkit-tap-highlight-color: transparent;
      }

      .hamburger-btn:active {
        background: var(--surface-3);
      }

      .hamburger-btn span {
        display: block;
        width: 16px;
        height: 2px;
        background: var(--text-secondary);
        border-radius: 1px;
        transition: all 0.25s ease;
      }

      /* ══════════════════════════════════════
         HISTORY DRAWER
         ══════════════════════════════════════ */
      .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .drawer-overlay.open {
        opacity: 1;
        visibility: visible;
      }

      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: min(380px, 85vw);
        height: 100dvh;
        background: var(--surface-1);
        border-left: 1px solid var(--border);
        z-index: 101;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .drawer-overlay.open .drawer {
        transform: translateX(0);
      }

      .drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .drawer-header h3 {
        font-size: 1rem;
        font-weight: 700;
        margin: 0;
      }

      .drawer-close {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
      }

      .drawer-close:active {
        background: var(--surface-3);
      }

      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .drawer-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .history-entry {
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      .history-entry:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .history-timestamp {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .history-empty {
        text-align: center;
        color: var(--text-tertiary);
        font-size: 0.9rem;
        padding: 40px 16px;
        line-height: 1.6;
      }

      /* Scale down tables inside drawer */
      .history-entry .result-card {
        margin-bottom: 8px;
      }

      .history-entry .result-table {
        font-size: 0.8rem;
      }

      .history-entry .result-table thead th {
        padding: 6px 10px;
        font-size: 0.65rem;
      }

      .history-entry .result-table tbody td {
        padding: 7px 10px;
      }

      .history-entry .result-card-header {
        padding: 8px 12px;
      }

      .history-entry .result-card-title {
        font-size: 0.8rem;
      }

      /* ══════════════════════════════════════
         DESKTOP POLISH
         ══════════════════════════════════════ */
      @media (min-width: 481px) {
        .card {
          padding: 40px 32px;
        }

        .mic-btn {
          width: 110px;
          height: 110px;
          font-size: 2.6rem;
        }

        .mic-wrapper {
          width: 160px;
          height: 160px;
        }
      }

      /* Remove number input spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
    </style>
  </head>
  <body>

    <!-- ═══════════ LOGIN VIEW ═══════════ -->
    <div id="login-view" class="card">
      <div class="brand">
        <div class="brand-icon">📋</div>
        <div class="brand-name">BolKhata</div>
      </div>
      <p class="brand-sub">Voice-powered inventory & ledger<br />for your shop</p>

      <div id="login-error" class="error-msg"></div>

      <!-- PRIMARY: Phone Auth -->
      <div id="auth-main">
        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <div class="phone-row">
            <input type="text" id="phone-country" value="+91" class="country-code" />
            <input type="tel" id="phone-number" placeholder="9876543210" class="phone-input" inputmode="numeric" pattern="[0-9]*" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
          </div>
        </div>
        <button id="send-sms-btn" class="btn btn-accent">Send OTP</button>
        <div id="recaptcha-container"></div>

        <div class="divider"><span>or</span></div>

        <button id="google-login-btn" class="btn btn-outline">
          <svg class="btn-icon-google" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

        <div class="link-row">
          <button id="show-email-btn" class="btn btn-ghost">Use email instead</button>
        </div>
      </div>

      <!-- OTP VIEW -->
      <div id="auth-otp" class="hidden">
        <div class="field-group">
          <label class="field-label">Verification Code</label>
          <input type="number" id="otp-code" placeholder="6-digit code" inputmode="numeric" autocomplete="one-time-code" />
        </div>
        <button id="verify-otp-btn" class="btn btn-accent" style="margin-bottom:10px;">Verify</button>
        <button id="cancel-otp-btn" class="btn btn-ghost">← Back</button>
      </div>

      <!-- EMAIL VIEW -->
      <div id="auth-email" class="hidden">
        <form id="login-form">
          <div class="field-group">
            <label class="field-label">Email</label>
            <input type="email" id="email" placeholder="you@email.com" required />
          </div>
          <div class="field-group">
            <label class="field-label">Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <button type="submit" id="login-btn" class="btn btn-accent">Sign In</button>
        </form>
        <div class="link-row" style="margin-top:12px;">
          <button id="toggle-email-mode-btn" class="btn btn-ghost">Create account</button>
          <span style="color:var(--text-tertiary);">·</span>
          <button id="back-to-main-btn" class="btn btn-ghost">← Back</button>
        </div>
      </div>
    </div>

    <!-- ═══════════ APP VIEW ═══════════ -->
    <!-- HISTORY DRAWER -->
    <div id="drawer-overlay" class="drawer-overlay">
      <div class="drawer">
        <div class="drawer-header">
          <h3>📜 Transaction History</h3>
          <button id="drawer-close" class="drawer-close">✕</button>
        </div>
        <div id="drawer-body" class="drawer-body">
          <div class="history-empty">No transactions yet.<br>Your history will appear here.</div>
        </div>
        <div class="drawer-footer">
          <button id="clear-history-btn" class="btn btn-ghost" style="color:var(--red); font-size:0.8rem;">Clear History</button>
        </div>
      </div>
    </div>

    <div id="app-view" class="card hidden">
      <div class="app-topbar">
        <button id="menu-btn" class="hamburger-btn" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="brand">
          <div class="brand-icon">📋</div>
          <div class="brand-name">BolKhata</div>
        </div>
        <button id="logout-btn" class="btn-logout">Log out</button>
      </div>

      <div class="mic-area">
        <div class="mic-wrapper">
          <button id="recordBtn" class="mic-btn">🎙️</button>
          <div class="mic-ring"></div>
          <div class="mic-ring-2"></div>
        </div>
        <div id="status" class="mic-hint">Hold to speak</div>
      </div>

      <div class="result-area">
        <div class="result-label">Response</div>
        <div id="result" class="result-container">
          <div class="result-placeholder">Tap and hold the mic, then speak naturally — e.g. "Saara stock dikhao" or "10 soap bech diya"</div>
        </div>
      </div>
    </div>

    <!-- ═══════════ SCRIPTS ═══════════ -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        onAuthStateChanged,
        signOut,
        RecaptchaVerifier,
        signInWithPhoneNumber,
        GoogleAuthProvider,
        signInWithPopup
      } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

      // ── Config ──
      const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      const API = isLocal ? "http://localhost:8000" : "";

      const configRes = await fetch(`${API}/config`);
      const firebaseConfig = await configRes.json();

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // ── DOM References ──
      const $ = id => document.getElementById(id);
      const loginView  = $("login-view");
      const appView    = $("app-view");
      const loginError = $("login-error");
      const authMain   = $("auth-main");
      const authOtp    = $("auth-otp");
      const authEmail  = $("auth-email");
      const drawerOverlay = $("drawer-overlay");
      const drawerBody = $("drawer-body");

      let currentToken = null;
      let currentUid = null;

      // ═══════ 1. AUTH STATE ═══════
      onAuthStateChanged(auth, async user => {
        if (user) {
          currentToken = await user.getIdToken();
          currentUid = user.uid;
          authMain.classList.remove("hidden");
          authOtp.classList.add("hidden");
          authEmail.classList.add("hidden");
          loginError.innerText = "";
          loginView.classList.add("hidden");
          appView.classList.remove("hidden");
          loadHistory();
        } else {
          currentToken = null;
          currentUid = null;
          appView.classList.add("hidden");
          loginView.classList.remove("hidden");
        }
      });

      $("logout-btn").addEventListener("click", () => signOut(auth));

      // ═══════ 2. PHONE AUTH ═══════
      window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
        size: "invisible"
      });

      let confirmationResult = null;

      $("send-sms-btn").addEventListener("click", async () => {
        loginError.innerText = "";
        const phone = $("phone-number").value.trim();
        if (phone.length < 10) { loginError.innerText = "Enter a valid phone number."; return; }

        const fullPhone = $("phone-country").value + phone;
        const btn = $("send-sms-btn");
        btn.innerHTML = '<div class="spinner"></div>';

        try {
          confirmationResult = await signInWithPhoneNumber(auth, fullPhone, window.recaptchaVerifier);
          authMain.classList.add("hidden");
          authOtp.classList.remove("hidden");
        } catch (err) {
          loginError.innerText = err.message || "Failed to send SMS.";
          if (window.recaptchaVerifier) window.recaptchaVerifier.render().then(id => grecaptcha.reset(id));
        } finally {
          btn.innerText = "Send OTP";
        }
      });

      $("phone-number").addEventListener("keydown", e => {
        if (e.key === "Enter") $("send-sms-btn").click();
      });

      $("verify-otp-btn").addEventListener("click", async () => {
        const code = $("otp-code").value.trim();
        loginError.innerText = "";
        const btn = $("verify-otp-btn");
        btn.innerHTML = '<div class="spinner"></div>';
        try { await confirmationResult.confirm(code); }
        catch { loginError.innerText = "Invalid OTP code."; }
        finally { btn.innerText = "Verify"; }
      });

      $("otp-code").addEventListener("keydown", e => {
        if (e.key === "Enter") $("verify-otp-btn").click();
      });

      $("cancel-otp-btn").addEventListener("click", () => {
        authOtp.classList.add("hidden");
        authMain.classList.remove("hidden");
        loginError.innerText = "";
        $("otp-code").value = "";
      });

      // ═══════ 3. GOOGLE AUTH ═══════
      $("google-login-btn").addEventListener("click", async () => {
        loginError.innerText = "";
        try { await signInWithPopup(auth, new GoogleAuthProvider()); }
        catch (err) { loginError.innerText = err.message || "Google sign-in failed."; }
      });

      // ═══════ 4. EMAIL AUTH ═══════
      let isSignup = false;

      $("show-email-btn").addEventListener("click", () => {
        authMain.classList.add("hidden");
        authEmail.classList.remove("hidden");
        loginError.innerText = "";
      });

      $("back-to-main-btn").addEventListener("click", () => {
        authEmail.classList.add("hidden");
        authMain.classList.remove("hidden");
        loginError.innerText = "";
        $("email").value = "";
        $("password").value = "";
      });

      $("toggle-email-mode-btn").addEventListener("click", e => {
        e.preventDefault();
        isSignup = !isSignup;
        $("login-btn").innerText = isSignup ? "Create Account" : "Sign In";
        $("toggle-email-mode-btn").innerText = isSignup ? "Already have an account?" : "Create account";
      });

      $("login-form").addEventListener("submit", async e => {
        e.preventDefault();
        loginError.innerText = "";
        const email = $("email").value, password = $("password").value;
        const btn = $("login-btn");
        btn.innerHTML = '<div class="spinner"></div>';
        try {
          isSignup
            ? await createUserWithEmailAndPassword(auth, email, password)
            : await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
          if (err.code === "auth/email-already-in-use") loginError.innerText = "Account exists — sign in instead.";
          else if (err.code === "auth/weak-password") loginError.innerText = "Password too weak (min 6 characters).";
          else loginError.innerText = err.message;
        } finally {
          btn.innerText = isSignup ? "Create Account" : "Sign In";
        }
      });

      // ═══════ 5. RECORDING ═══════
      let mediaRecorder, audioChunks = [], activeStream;
      const recordBtn = $("recordBtn");
      const statusEl  = $("status");
      const resultEl  = $("result");

      const startRecording = async e => {
        if (e.cancelable) e.preventDefault();
        if (!currentToken) return;

        try {
          activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(activeStream);
          audioChunks = [];

          mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);

          mediaRecorder.onstop = async () => {
            activeStream.getTracks().forEach(t => t.stop());
            currentToken = await auth.currentUser.getIdToken();

            statusEl.innerText = "Processing";
            statusEl.classList.add("processing-dots");

            const blob = new Blob(audioChunks, { type: "audio/webm" });
            const form = new FormData();
            form.append("audio", blob, "recording.webm");

            try {
              const res = await fetch(`${API}/process_voice`, {
                method: "POST",
                headers: { Authorization: `Bearer ${currentToken}` },
                body: form
              });

              if (res.status === 401) { signOut(auth); return; }
              const data = await res.json();

              if (data.status === "success") {
                const results = data.results || [];
                const errors = data.errors || [];
                renderResults(results, errors);
                statusEl.innerText = "Done ✓";
              } else {
                resultEl.innerHTML = `<div class="error-item">❌ ${data.message || "Something went wrong."}</div>`;
                statusEl.innerText = "Error";
              }
            } catch {
              resultEl.innerHTML = '<div class="error-item">❌ Could not connect to the server.</div>';
              statusEl.innerText = "Offline";
            } finally {
              statusEl.classList.remove("processing-dots");
            }
          };

          mediaRecorder.start();
          statusEl.innerText = "Listening…";
          statusEl.classList.remove("processing-dots");
          resultEl.innerHTML = '';
          recordBtn.classList.add("recording");
        } catch {
          statusEl.innerText = "Microphone access denied.";
        }
      };

      const stopRecording = e => {
        if (e.cancelable) e.preventDefault();
        if (mediaRecorder?.state === "recording") {
          mediaRecorder.stop();
          recordBtn.classList.remove("recording");
        }
      };

      recordBtn.addEventListener("mousedown", startRecording);
      recordBtn.addEventListener("mouseup", stopRecording);
      recordBtn.addEventListener("mouseleave", stopRecording);
      recordBtn.addEventListener("touchstart", startRecording, { passive: false });
      recordBtn.addEventListener("touchend", stopRecording);
      recordBtn.addEventListener("touchcancel", stopRecording);

      // Spacebar to Record (Desktop)
      window.addEventListener("keydown", e => {
        if (e.code === "Space" && !appView.classList.contains("hidden")) {
          // Ignore if typing in an input/textarea if any exist
          if (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") return;
          e.preventDefault();
          if (!recordBtn.classList.contains("recording")) {
            startRecording(e);
          }
        }
      });
      window.addEventListener("keyup", e => {
        if (e.code === "Space" && !appView.classList.contains("hidden")) {
          if (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") return;
          e.preventDefault();
          stopRecording(e);
        }
      });

      // ═══════ 6. TABLE RENDERER ═══════
      const numericColumns = new Set(["#", "Stock", "Qty", "Sold", "Added", "Previous", "Current", "Current Stock", "Quantity Owed"]);

      function buildResultHTML(results, errors) {
        let html = '';
        for (const group of results) {
          html += '<div class="result-card">';
          html += `<div class="result-card-header">
            <span class="result-card-icon">${group.icon}</span>
            <span class="result-card-title">${group.title}</span>
          </div>`;
          if (group.empty_message) {
            html += `<div class="result-card-empty">${group.empty_message}</div>`;
          } else if (group.rows && group.rows.length > 0) {
            html += '<div class="table-scroll"><table class="result-table"><thead><tr>';
            for (const col of group.columns) {
              const cls = numericColumns.has(col) ? ' class="cell-num"' : '';
              html += `<th${cls}>${col}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (const row of group.rows) {
              html += '<tr>';
              for (const col of group.columns) {
                const cls = numericColumns.has(col) ? ' class="cell-num"' : '';
                html += `<td${cls}>${row[col] ?? '-'}</td>`;
              }
              html += '</tr>';
            }
            html += '</tbody></table></div>';
          }
          html += '</div>';
        }
        if (errors.length > 0) {
          html += '<ul class="error-list">';
          for (const err of errors) {
            html += `<li class="error-item">❌ ${err}</li>`;
          }
          html += '</ul>';
        }
        return html;
      }

      function renderResults(results, errors) {
        const html = buildResultHTML(results, errors);
        resultEl.innerHTML = html || '<div class="result-placeholder">No results</div>';
      }

      // ═══════ 7. HISTORY (Firestore-backed) ═══════
      function formatTime(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        const now = new Date();
        const isToday = d.toDateString() === now.toDateString();
        const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (isToday) return `Today, ${time}`;
        const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
        if (d.toDateString() === yesterday.toDateString()) return `Yesterday, ${time}`;
        return `${d.toLocaleDateString([], { day: 'numeric', month: 'short' })}, ${time}`;
      }

      async function loadHistory() {
        drawerBody.innerHTML = '<div class="history-empty">Loading...</div>';
        try {
          const token = await auth.currentUser.getIdToken();
          const res = await fetch(`${API}/history`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const data = await res.json();
          const history = data.history || [];

          if (history.length === 0) {
            drawerBody.innerHTML = '<div class="history-empty">No transactions yet.<br>Your history will appear here.</div>';
            return;
          }
          let html = '';
          for (const entry of history) {
            html += '<div class="history-entry">';
            html += `<div class="history-timestamp">${formatTime(entry.timestamp)}</div>`;
            html += buildResultHTML(entry.results || [], entry.errors || []);
            html += '</div>';
          }
          drawerBody.innerHTML = html;
        } catch {
          drawerBody.innerHTML = '<div class="history-empty">Could not load history.</div>';
        }
      }

      // Drawer controls
      $("menu-btn").addEventListener("click", () => {
        loadHistory();
        drawerOverlay.classList.add("open");
      });

      $("drawer-close").addEventListener("click", () => {
        drawerOverlay.classList.remove("open");
      });

      drawerOverlay.addEventListener("click", e => {
        if (e.target === drawerOverlay) drawerOverlay.classList.remove("open");
      });

      $("clear-history-btn").addEventListener("click", async () => {
        try {
          const token = await auth.currentUser.getIdToken();
          await fetch(`${API}/history`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` }
          });
          loadHistory();
        } catch {
          // silently fail
        }
      });
    </script>
  </body>
</html>
